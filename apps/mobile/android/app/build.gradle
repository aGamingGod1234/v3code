// V3 Phase 9 — module-level Gradle config for the Capacitor Android
// wrapper. Produces `com.agaminggod.v3code` at the versionCode / versionName
// injected by the `release-mobile.yml` workflow.
//
// Play Store releases ship as AABs (bundleRelease). The internal /
// closed / open tracks use the matching `releaseMobileChannel` gradle
// property — CI wires it into `VITE_V3_MOBILE_CHANNEL` before staging
// the webview bundle.

apply plugin: 'com.android.application'

android {
    namespace "com.agaminggod.v3code"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.agaminggod.v3code"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode (project.findProperty('v3VersionCode')?.toInteger() ?: 1)
        versionName (project.findProperty('v3VersionName')?.toString() ?: '0.0.20')
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Capacitor prefers no compression on web assets so WebView zips are fast
            noCompress 'mp4', 'json'
        }
    }
    buildFeatures {
        buildConfig true
    }
    buildTypes {
        debug {
            minifyEnabled false
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.findByName('release') ?: signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    packaging {
        resources {
            excludes += [
                'META-INF/AL2.0',
                'META-INF/LGPL2.1',
                'META-INF/INDEX.LIST',
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE*',
                'META-INF/NOTICE*',
            ]
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.firebase:firebase-messaging:$firebaseMessagingVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found — FCM disabled in this build.")
}
