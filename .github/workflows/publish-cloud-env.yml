name: Publish cloud-env image

on:
  push:
    branches:
      - main
    paths:
      - "apps/cloud-env-image/**"
      - ".github/workflows/publish-cloud-env.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to `latest`)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-cloud-env-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + push ghcr.io/v3-code/cloud-env
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Spec §7.1 pins the image to `ghcr.io/v3-code/cloud-env:latest`.
      # Tagged releases also publish a semver tag so operators can pin.
      - name: Compute image tags
        id: tags
        run: |
          set -eu
          base="ghcr.io/${{ github.repository_owner }}/cloud-env"
          # Normalise owner to lowercase for GHCR.
          base=$(echo "$base" | tr '[:upper:]' '[:lower:]')
          tags=""
          dispatch_tag="${{ github.event.inputs.tag }}"
          if [ -n "$dispatch_tag" ]; then
            tags="$base:$dispatch_tag"
          fi
          if [ "${{ github.event_name }}" = "release" ]; then
            ref="${{ github.ref }}"
            version="${ref#refs/tags/v}"
            tags="${tags:+$tags,}$base:v$version,$base:latest"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="${tags:+$tags,}$base:latest,$base:sha-${GITHUB_SHA::7}"
          fi
          if [ -z "$tags" ]; then
            tags="$base:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: apps/cloud-env-image
          file: apps/cloud-env-image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache from the previous `latest` so incremental layer
          # publishes don't re-download the entire Ubuntu base.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cloud-env:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cloud-env:buildcache,mode=max

      - name: Smoke-test published image
        run: |
          set -eu
          image="ghcr.io/${{ github.repository_owner }}/cloud-env:latest"
          image=$(echo "$image" | tr '[:upper:]' '[:lower:]')
          docker pull "$image"
          # Spec §7.1 verifies the image actually carries the CLIs we
          # promise. Fail the workflow if any of these binaries aren't
          # on PATH.
          docker run --rm --entrypoint bash "$image" -lc '
            set -eu
            for tool in node git python3 uv claude codex rg fd bat jq; do
              command -v "$tool" >/dev/null 2>&1 || { echo "missing $tool" >&2; exit 1; }
            done
            node --version
            python3 --version
            echo "cloud-env smoke test passed."
          '
